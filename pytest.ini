[pytest]
addopts = -v --maxfail=0 --alluredir=allure-results --clean-alluredir
testpaths = tests
python_files = test_*.py *_test.py tc_*.py

markers =
    smoke: critical tests for deployment
    regression: full regression tests
    sanity: quick check after bug fix
    slow: long running tests
    ui: ui related tests
    negative: tests for negative scenarios
    positive: tests for positive scenarios